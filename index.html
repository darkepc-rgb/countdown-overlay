<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer with Auto Roulette</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; background-color: #1a1a1a; color: white;
            font-family: 'Itim', cursive; text-align: center; margin: 0; padding-top: 60px;
            padding-bottom: 20px;
        }
        .timer-stack-wrapper {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 576px; height: 324px; margin-bottom: 30px;
        }
        #timer {
            position: relative; z-index: 1; font-size: 3.5rem; font-weight: bold;
            transition: color 0.3s ease; margin-top: 22px; margin-left: 125px; 
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 4px 12px rgba(0,0,0,0.9);
        }
        .cat-overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .cat-overlay-layer img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.5s ease-in-out; opacity: 1; }
        .red { color: #ff3e3e !important; }
        .boost-up { color: #2ecc71 !important; }
        .boost-down { color: #ff4757 !important; }

        .mode-indicator { font-size: 20px; margin-bottom: 12px; font-weight: bold; }
        .mode-indicator span { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
        .roulette-container { position: relative; width: 576px; padding: 10px 0; margin-bottom: 20px; display: flex; justify-content: center; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #ff2222; font-size: 40px; z-index: 10; text-shadow: 0 2px 8px rgba(255,0,0,0.5); }
        .window { width: 100%; overflow: hidden; background: #0f0f0f; border: 3px solid #333; border-radius: 12px; padding: 20px 0; position: relative; }
        .track { display: flex; transition: transform 4s cubic-bezier(0.15, 0.85, 0.15, 1); }
        .item { min-width: 120px; height: 50px; margin: 0 10px; background: #000; border: 2px solid #222; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: bold; }
        .item.plus { color: #39ff14; } .item.minus { color: #ff3333; }
        
        .instructions { font-size: 15px; color: #ccc; margin-bottom: 15px; }
        .key-badge { background: #222; color: #ffaa00; padding: 3px 8px; border-radius: 4px; border: 1px solid #444; }
        .buttons { margin-top: 5px; z-index: 10; }
        .buttons button { margin: 3px; padding: 8px 16px; cursor: pointer; border-radius: 8px; font-family: 'Itim', cursive; font-weight: bold; border: 2px solid #333; background: #fff; color: #000; }
        #startBtn.active { background: #27ae60; color: white; }
        #stopBtn.active { background: #e74c3c; color: white; }
        #resetBtn { background: #f39c12; color: white; }
    </style>
</head>
<body>

    <div class="timer-stack-wrapper">
        <div id="timer">03 : 00 : 00</div>
        <div class="cat-overlay-layer" id="catLayer"><img src="cat3-3.png" id="catImage"></div>
    </div>
    
    <div class="mode-indicator" id="modeIndicator">วงล้อพร้อมสุ่ม: <span>รอสัญญาณปุ่ม G1 - G3</span></div>
    <div class="roulette-container">
        <div class="pointer">▼</div>
        <div class="window" id="windowDiv"><div class="track" id="track"></div></div>
    </div>
    <div class="instructions">
        <span class="key-badge">G1 (Alt+1)</span> วินาที | <span class="key-badge">G2 (Alt+2)</span> นาทีใหญ่ | <span class="key-badge">G3 (Alt+3)</span> 10 Pok
    </div>
    
    <div class="buttons">
        <button onclick="smartBoost(5*60,1000,'effect-5-10')">+5M</button><button onclick="smartBoost(10*60,1000,'effect-5-10')">+10M</button>
        <button onclick="smartBoost(30*60,2000,'effect-30')">+30M</button><button onclick="smartBoost(60*60,4000,'effect-60')">+1ชม.</button>
    </div>
    <div class="buttons">
        <button onclick="smartBoost(-5*60,1000,'effect-5-10')">-5M</button><button onclick="smartBoost(-10*60,1000,'effect-5-10')">-10M</button>
        <button onclick="smartBoost(-30*60,2000,'effect-30')">-30M</button><button onclick="smartBoost(-60*60,4000,'effect-60')">-1ชม.</button>
    </div>
    <div class="buttons">
        <button id="stopBtn" onclick="stopTimer()">หยุด</button><button id="resetBtn" onclick="resetTimer()">รีเซต</button><button id="startBtn" onclick="startTimer()">เริ่ม</button>
    </div>
    
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCTqaj2D4b5p_loXgh7jjIW9D5zfi_2dUk", databaseURL: "https://countdown-timer-8dd4c-default-rtdb.asia-southeast1.firebasedatabase.app/", projectId: "countdown-timer-8dd4c" };
    firebase.initializeApp(firebaseConfig);
    const timerRef = firebase.database().ref('timer_data');
    window.countdownTime = 3 * 60 * 60;
    const timerElement = document.getElementById('timer');
    const catImage = document.getElementById('catImage');
    const catLayer = document.getElementById('catLayer');
    const track = document.getElementById('track');
    const windowDiv = document.getElementById('windowDiv');
    const modeIndicator = document.getElementById('modeIndicator');
    window.interval = null;
    let isMaster = false, isSpinning = false, lastEventId = "INIT";

    function createPool(opts) { let p=[]; opts.forEach(o=>{for(let i=0;i<o.weight;i++)p.push(o.value)}); return p; }
    const pools = {
        G1: createPool([{value:'+10S',weight:12},{value:'-10S',weight:12},{value:'+30S',weight:7},{value:'-30S',weight:7}]),
        G2: createPool([{value:'+5M',weight:33},{value:'-5M',weight:27},{value:'+15M',weight:11},{value:'-15M',weight:9}]),
        G3: createPool([{value:'+5M',weight:44},{value:'-5M',weight:36},{value:'+10M',weight:22},{value:'-10M',weight:18}])
    };

    function startSpin(name, pool) {
        if (isSpinning) return;
        isSpinning = true;
        track.innerHTML = '';
        for(let i=0; i<60; i++) {
            let item = document.createElement('div');
            let v = pool[Math.floor(Math.random()*pool.length)];
            item.className = 'item ' + (v.includes('+')?'plus':'minus');
            item.innerText = '[ '+v+' ]';
            track.appendChild(item);
        }
        track.style.transition = 'transform 4s cubic-bezier(0.15,0.85,0.15,1)';
        track.style.transform = `translateX(${-50*140 + (windowDiv.offsetWidth/2 - 70)}px)`;
        setTimeout(() => {
            let v = track.children[50].innerText.replace('[','').replace(']','').trim();
            isSpinning = false;
            let m = parseInt(v), s = v.includes('M')?m*60:m;
            smartBoost(v.includes('-')?-s:s, 1000, 'effect-5-10');
        }, 4000);
    }

    window.addEventListener('keydown', (e) => {
        if(!e.altKey) return;
        if(e.key==='1') startSpin('G1', pools.G1);
        if(e.key==='2') startSpin('G2', pools.G2);
        if(e.key==='3') startSpin('G3', pools.G3);
    });

    function updateTimerDisplay() {
        let h=Math.floor(window.countdownTime/3600), m=Math.floor((window.countdownTime%3600)/60), s=window.countdownTime%60;
        timerElement.innerHTML = `${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;
    }

    window.smartBoost = function(t, d, c) {
        isMaster = true;
        window.countdownTime = Math.max(0, window.countdownTime + t);
        updateTimerDisplay();
        timerRef.update({remainingTime: window.countdownTime, boostEvent: {id: 'ev_'+Date.now()}});
    }

    function startTimer() { if(!window.interval) window.interval = setInterval(()=>{if(window.countdownTime>0){window.countdownTime--; updateTimerDisplay();}}, 1000); }
    function stopTimer() { clearInterval(window.interval); window.interval = null; }
    function resetTimer() { stopTimer(); window.countdownTime = 3*60*60; updateTimerDisplay(); }

    timerRef.on('value', (s) => { const d = s.val(); if(d && !isMaster) { window.countdownTime = d.remainingTime; updateTimerDisplay(); } });
    updateTimerDisplay();
</script>
</body>
</html>
