<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer - Firebase Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: transparent; 
            color: white;
            font-family: 'Itim', cursive;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .timer-stack-wrapper {
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 576px;  
            height: 324px; 
        }

        #timer {
            position: relative;
            z-index: 1; 
            font-size: 3.5rem; 
            font-weight: bold;
            transition: color 0.3s ease;
            margin-top: 22px;   
            margin-left: 125px; 
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0px  4px 12px rgba(0,0,0,0.9);
        }

        .cat-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            pointer-events: none; 
        }

        .cat-overlay-layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.5s ease-in-out, transform 0.3s ease-out;
            opacity: 1;
        }

        /* Animations */
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes pulse-medium { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes pulse-strong { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .effect-5-10 { animation: pulse-soft 0.8s infinite ease-in-out; }
        .effect-30 { animation: pulse-medium 0.5s infinite ease-in-out; }
        .effect-60 { animation: pulse-strong 0.4s infinite ease-in-out; }

        .red { color: #ff3e3e !important; }
        .boost-up { color: #2ecc71 !important; }
        .boost-down { color: #ff4757 !important; }

        .buttons { margin-top: 20px; z-index: 10; position: relative; }
        .buttons button {
            margin: 5px; padding: 10px 18px; font-size: 1rem; font-weight: bold; cursor: pointer;
            border: 2px solid #333; background: #ffffff; border-radius: 8px; font-family: 'Itim', cursive;
            box-shadow: 0 4px 0 #999;
        }
    </style>
</head>
<body>

    <div class="timer-stack-wrapper">
        <div id="timer">03 : 00 : 00</div>
        <div class="cat-overlay-layer" id="catLayer">
            <img src="cat3-3.png" id="catImage">
        </div>
    </div>
    
    <div class="buttons">
        <button onclick="smartBoost(5 * 60, 1000, 'effect-5-10')">+5 นาที</button>
        <button onclick="smartBoost(10 * 60, 1000, 'effect-5-10')">+10 นาที</button>
        <button onclick="smartBoost(30 * 60, 2000, 'effect-30')">+30 นาที</button>
        <button onclick="smartBoost(60 * 60, 4000, 'effect-60')">+1 ชม.</button>
    </div>
    <div class="buttons">
        <button onclick="smartBoost(-5 * 60, 1000, 'effect-5-10')">-5 นาที</button>
        <button onclick="smartBoost(-10 * 60, 1000, 'effect-5-10')">-10 นาที</button>
        <button onclick="smartBoost(-30 * 60, 2000, 'effect-30')">-30 นาที</button>
        <button onclick="smartBoost(-60 * 60, 4000, 'effect-60')">-1 ชม.</button>
    </div>
    <div class="buttons">
        <button id="stopBtn" onclick="stopTimer()">หยุด</button>
        <button id="resetBtn" onclick="resetTimer()">รีเซต</button>
        <button id="startBtn" onclick="startTimer()">เริ่ม</button>
    </div>
    
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTqaj2D4b5p_loXgh7jjIW9D5zfi_2dUk",
        authDomain: "countdown-timer-8dd4c.firebaseapp.com",
        databaseURL: "https://countdown-timer-8dd4c-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "countdown-timer-8dd4c",
        storageBucket: "countdown-timer-8dd4c.firebasestorage.app",
        messagingSenderId: "1086221236719",
        appId: "1:1086221236719:web:5e3148af69cb7303c1de1a",
        measurementId: "G-P2TLY8RGZV"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const timerRef = db.ref('timer_data');

    // ส่งสัญญาณไป Firebase ทันทีที่เริ่ม Boost
    function syncBoostStart(totalSeconds, durationMs, effectClass) {
        timerRef.update({
            boostData: {
                totalSeconds: totalSeconds,
                durationMs: durationMs,
                effectClass: effectClass,
                timestamp: Date.now()
            },
            isRunning: window.interval !== null
        });
    }

    function syncState() {
        timerRef.update({
            remainingTime: window.countdownTime,
            isRunning: window.interval !== null,
            lastUpdate: Date.now()
        });
    }

    window.countdownTime = localStorage.getItem('countdownTime') ? parseInt(localStorage.getItem('countdownTime')) : 10800;
    const timerElement = document.getElementById('timer');
    const catLayer = document.getElementById('catLayer');
    const catImage = document.getElementById('catImage');
    window.interval = null;
    let isChangingImage = false;

    function fadeChangeImage(newSrc) {
        if (catImage.src.includes(newSrc) || isChangingImage) return;
        isChangingImage = true;
        catImage.style.opacity = 0;
        setTimeout(() => {
            catImage.src = newSrc;
            catImage.style.opacity = 1;
            isChangingImage = false;
        }, 500);
    }

    function updateTimerDisplay() {
        let h = Math.floor(window.countdownTime / 3600);
        let m = Math.floor((window.countdownTime % 3600) / 60);
        let s = Math.round(window.countdownTime % 60);
        timerElement.innerHTML = `${String(h).padStart(2, '0')} : ${String(m).padStart(2, '0')} : ${String(s).padStart(2, '0')}`;
        
        if (window.countdownTime <= 1800) {
            timerElement.classList.add('red');
            fadeChangeImage("cat3-1.png");
        } else if (window.countdownTime <= 7200) {
            timerElement.classList.remove('red');
            fadeChangeImage("cat3-2.png");
        } else {
            timerElement.classList.remove('red');
            fadeChangeImage("cat3-3.png");
        }
    }

    // ฟังก์ชันรัน Boost (เรียกใช้ทั้งเครื่องที่กด และเครื่องที่ซิงค์)
    window.runBoostAnimation = function(totalSeconds, durationMs, effectClass) {
        const fps = 30;
        const totalSteps = (durationMs / 1000) * fps;
        const increment = totalSeconds / totalSteps;
        let steps = 0;
        let lastIntegerChange = 0;
        let accumulated = 0;

        timerElement.classList.add(totalSeconds > 0 ? 'boost-up' : 'boost-down');
        catLayer.classList.add(effectClass);

        let boostInterval = setInterval(() => {
            steps++;
            accumulated += increment;
            let currentInt = Math.round(accumulated);
            let diff = currentInt - lastIntegerChange;
            lastIntegerChange = currentInt;

            window.countdownTime = Math.max(0, window.countdownTime + diff);
            updateTimerDisplay();

            if (steps >= totalSteps) {
                clearInterval(boostInterval);
                timerElement.classList.remove('boost-up', 'boost-down');
                catLayer.classList.remove('effect-5-10', 'effect-30', 'effect-60');
                localStorage.setItem('countdownTime', Math.round(window.countdownTime));
            }
        }, 1000 / fps);
    }

    window.smartBoost = function(totalSeconds, durationMs, effectClass) {
        window.runBoostAnimation(totalSeconds, durationMs, effectClass); // เล่นที่เครื่องตัวเอง
        syncBoostStart(totalSeconds, durationMs, effectClass); // ส่งสัญญาณบอกเครื่องอื่น
    }

    window.startTimer = function(local = true) {
        if (!window.interval) {
            window.interval = setInterval(() => {
                if (window.countdownTime > 0) {
                    window.countdownTime--;
                    updateTimerDisplay();
                    localStorage.setItem('countdownTime', window.countdownTime);
                }
            }, 1000);
            document.getElementById('startBtn').classList.add('active');
            if (local) syncState();
        }
    }

    window.stopTimer = function(local = true) {
        clearInterval(window.interval);
        window.interval = null;
        document.getElementById('startBtn').classList.remove('active');
        if (local) syncState();
    }

    window.resetTimer = function() {
        window.stopTimer();
        window.countdownTime = 10800;
        updateTimerDisplay();
        syncState();
    }

    // --- Listener ---
    let lastBoostTime = 0;
    timerRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // ซิงค์เวลาปกติ (ถ้าเครื่องไม่ได้กำลัง Boost อยู่)
        if (!document.querySelector('.boost-up') && !document.querySelector('.boost-down')) {
            window.countdownTime = data.remainingTime || window.countdownTime;
            updateTimerDisplay();
        }

        // เช็คการเริ่ม Boost จากเครื่องอื่น
        if (data.boostData && data.boostData.timestamp > lastBoostTime) {
            lastBoostTime = data.boostData.timestamp;
            // ถ้าเป็นเครื่องที่ไม่ได้กดปุ่มเอง (เช่นหน้าจอ TikTok) ให้รัน Boost ตาม
            if (Date.now() - data.boostData.timestamp < 1000) {
                 window.runBoostAnimation(data.boostData.totalSeconds, data.boostData.durationMs, data.boostData.effectClass);
            }
        }

        if (data.isRunning && !window.interval) window.startTimer(false);
        else if (!data.isRunning && window.interval) window.stopTimer(false);
    });

    updateTimerDisplay();
</script>
</body>
</html>
