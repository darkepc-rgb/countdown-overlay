<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer with Auto Roulette (Balanced Spacing)</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; background-color: transparent; color: white;
            font-family: 'Itim', cursive; text-align: center; margin: 0; padding-top: 20px; /* ลดลงจาก 40px */
        }
        
        /* =================================================== */
        /* [1] ส่วนของ TIMER STACK (ปรับระยะกระชับขึ้น) */
        /* =================================================== */
        .timer-stack-wrapper {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 576px; height: 324px; 
            margin-bottom: 40px; /* ลดลงจาก 80px */
        }
        #timer {
            position: relative; z-index: 1; font-size: 3.5rem; font-weight: bold;
            transition: color 0.3s ease; margin-top: 22px; margin-left: 125px; 
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 4px 12px rgba(0,0,0,0.9);
        }
        .cat-overlay-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; 
        }
        .cat-overlay-layer img {
            width: 100%; height: 100%; object-fit: contain;
            transition: opacity 0.5s ease-in-out, transform 0.3s ease-out; opacity: 1;
        }

        /* =================================================== */
        /* [2] ส่วนของ วงล้อสุ่ม ROULETTE UI (ลดระยะห่างให้พอดีสายตา) */
        /* =================================================== */
        .mode-indicator {
            font-size: 22px; 
            margin-top: 20px;    /* ลดลงจาก 40px */
            margin-bottom: 12px; /* ลดลงจาก 25px */
            font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }
        .mode-indicator span { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }

        .roulette-container {
            position: relative; width: 576px; 
            padding: 12px 0; /* ลดลงจาก 25px */
            margin-bottom: 25px; /* ลดลงจาก 50px */
            display: flex; justify-content: center;
        }
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            color: #ff2222; font-size: 42px; z-index: 10; text-shadow: 0 2px 8px rgba(255, 0, 0, 0.6);
        }
        .window {
            width: 100%; overflow: hidden; background: #0f0f0f; border: 3px solid #333;
            border-radius: 12px; padding: 20px 0; position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 5px 15px rgba(0,0,0,0.5);
        }
        .window::before, .window::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 20%; z-index: 5; pointer-events: none;
        }
        .window::before { left: 0; background: linear-gradient(to right, #0f0f0f, transparent); }
        .window::after { right: 0; background: linear-gradient(to left, #0f0f0f, transparent); }

        .track { display: flex; transition: transform 4s cubic-bezier(0.15, 0.85, 0.15, 1); transform: translateX(0); }
        .item {
            min-width: 120px; height: 50px; margin: 0 10px; background: #000;
            border: 2px solid #222; border-radius: 8px; display: flex; justify-content: center;
            align-items: center; font-size: 22px; font-weight: bold; box-sizing: border-box;
            transition: transform 0.3s, box-shadow 0.3s, color 0.3s;
        }
        .item.plus { color: #39ff14; text-shadow: 0 0 5px #39ff14; }
        .item.minus { color: #ff3333; text-shadow: 0 0 5px #ff3333; }

        /* --- Animations ของตัวนับเวลา --- */
        @keyframes pulse-soft {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.1); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes pulse-medium {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes pulse-strong {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.08); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .effect-5-10 { animation: pulse-soft 0.8s infinite ease-in-out; }
        .effect-30 { animation: pulse-medium 0.5s infinite ease-in-out; }
        .effect-60 { animation: pulse-strong 0.4s infinite ease-in-out; }

        .red { color: #ff3e3e !important; }
        .boost-up { color: #2ecc71 !important; }
        .boost-down { color: #ff4757 !important; }

        /* =================================================== */
        /* [3] ส่วนของ แผงปุ่มกด และคู่มือ */
        /* =================================================== */
        .instructions { 
            font-size: 15px; color: #ccc; 
            margin-top: 10px;    /* ลดลงจาก 20px */
            margin-bottom: 20px; /* ลดลงจาก 40px */
            line-height: 1.5;    /* ลดลงจาก 2 เพื่อให้กระชับขึ้น */
            text-shadow: 0 1px 3px #000; 
        }
        .key-badge { background: #222; color: #ffaa00; padding: 3px 8px; border-radius: 4px; border: 1px solid #444; }

        .buttons { 
            margin-top: 12px; /* ลดลงจาก 25px */
            z-index: 10; position: relative; 
        }
        .buttons button {
            margin: 4px; padding: 10px 16px; font-size: 0.95rem; font-weight: bold;
            cursor: pointer; border: 2px solid #333; background: #ffffff;
            color: #000; border-radius: 8px; font-family: 'Itim', cursive;
            box-shadow: 0 3px 0 #999, 0 4px 8px rgba(0,0,0,0.3); transition: all 0.1s ease;
        }
        .buttons button:active { transform: translateY(2px); box-shadow: 0 1px 0 #777; }
        #startBtn.active { background: #27ae60; color: white; border-color: #1e8449; box-shadow: 0 3px 0 #1e8449; }
        #stopBtn.active { background: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 3px 0 #c0392b; }
        #resetBtn { background: #f39c12; color: white; border-color: #d35400; box-shadow: 0 3px 0 #d35400; }
    </style>
</head>
<body>

    <div class="timer-stack-wrapper">
        <div id="timer">03 : 00 : 00</div>
        <div class="cat-overlay-layer" id="catLayer">
            <img src="cat3-3.png" id="catImage">
        </div>
    </div>
    
    <div class="mode-indicator" id="modeIndicator">วงล้อพร้อมสุ่ม: <span>รอสัญญาณปุ่ม G1 - G3</span></div>
    <div class="roulette-container">
        <div class="pointer">▼</div>
        <div class="window" id="windowDiv">
            <div class="track" id="track"></div>
        </div>
    </div>
    <div class="instructions">
        <span class="key-badge">G1 (Alt+1)</span> สุ่มวินาที | 
        <span class="key-badge">G2 (Alt+2)</span> สุ่มนาทีใหญ่ | 
        <span class="key-badge">G3 (Alt+3)</span> สุ่มโหมด 10 Pok (เรท 55/45)
    </div>
    
    <div class="buttons">
        <button onclick="smartBoost(5 * 60, 1000, 'effect-5-10')">+5 นาที</button>
        <button onclick="smartBoost(10 * 60, 1000, 'effect-5-10')">+10 นาที</button>
        <button onclick="smartBoost(30 * 60, 2000, 'effect-30')">+30 นาที</button>
        <button onclick="smartBoost(60 * 60, 4000, 'effect-60')">+1 ชม.</button>
    </div>
    <div class="buttons">
        <button onclick="smartBoost(-5 * 60, 1000, 'effect-5-10')">-5 นาที</button>
        <button onclick="smartBoost(-10 * 60, 1000, 'effect-5-10')">-10 นาที</button>
        <button onclick="smartBoost(-30 * 60, 2000, 'effect-30')">-30 นาที</button>
        <button onclick="smartBoost(-60 * 60, 4000, 'effect-60')">-1 ชม.</button>
    </div>
    <div class="buttons">
        <button id="stopBtn" onclick="stopTimer()">หยุด</button>
        <button id="resetBtn" onclick="resetTimer()">รีเซต</button>
        <button id="startBtn" onclick="startTimer()">เริ่ม</button>
    </div>
    
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // --- ตั้งค่า Firebase ดั้งเดิมของพี่ ---
    const firebaseConfig = {
        apiKey: "AIzaSyCTqaj2D4b5p_loXgh7jjIW9D5zfi_2dUk",
        authDomain: "countdown-timer-8dd4c.firebaseapp.com",
        databaseURL: "https://countdown-timer-8dd4c-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "countdown-timer-8dd4c",
        storageBucket: "countdown-timer-8dd4c.firebasestorage.app",
        messagingSenderId: "1086221236719",
        appId: "1:1086221236719:web:5e3148af69cb7303c1de1a",
        measurementId: "G-P2TLY8RGZV"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const timerRef = db.ref('timer_data');

    window.countdownTime = 3 * 60 * 60;
    const timerElement = document.getElementById('timer');
    const catImage = document.getElementById('catImage');
    const catLayer = document.getElementById('catLayer');
    const track = document.getElementById('track');
    const windowDiv = document.getElementById('windowDiv');
    const modeIndicator = document.getElementById('modeIndicator');
    window.interval = null;
    
    let isMaster = false; 
    let activeBoosts = 0;
    let lastEventId = "INIT"; 
    let isChangingImage = false;
    let isSpinning = false;

    // --- ระบบดวงสุ่มเรทสมดุล 55/45 ---
    const secondsOptions = [
        { value: '+ 10 S', weight: 12 }, { value: '- 10 S', weight: 12 },
        { value: '+ 20 S', weight: 10 }, { value: '- 20 S', weight: 10 },
        { value: '+ 30 S', weight: 7 },  { value: '- 30 S', weight: 7 },
        { value: '+ 40 S', weight: 4 },  { value: '- 40 S', weight: 4 },
        { value: '+ 50 S', weight: 2 },  { value: '- 50 S', weight: 2 },
        { value: '+ 60 S', weight: 1 },  { value: '- 60 S', weight: 1 }
    ];
    const minutesLargeOptions = [
        { value: '+ 5 M', weight: 33 },  { value: '- 5 M', weight: 27 },
        { value: '+ 10 M', weight: 22 }, { value: '- 10 M', weight: 18 },
        { value: '+ 15 M', weight: 11 }, { value: '- 15 M', weight: 9 },
        { value: '+ 30 M', weight: 5 },  { value: '- 30 M', weight: 4 },
        { value: '+ 60 M', weight: 3 },  { value: '- 60 M', weight: 2 }
    ];
    const minutesSmallOptions = [
        { value: '+ 5 M', weight: 44 },  { value: '- 5 M', weight: 36 },
        { value: '+ 10 M', weight: 22 }, { value: '- 10 M', weight: 18 },
        { value: '+ 15 M', weight: 3 },  { value: '- 15 M', weight: 2 } 
    ];

    function createPool(options) {
        let pool = [];
        options.forEach(opt => { for (let i = 0; i < opt.weight; i++) { pool.push(opt.value); } });
        return pool;
    }
    const secondsPool = createPool(secondsOptions);
    const minutesLargePool = createPool(minutesLargeOptions);
    const minutesSmallPool = createPool(minutesSmallOptions);

    // --- ระบบเสียง Web Audio API ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 850; osc.type = 'sine';
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }
    function playWin() {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 1174.66; osc.type = 'triangle';
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);
        osc.start(); osc.stop(audioCtx.currentTime + 1.0);
    }

    // --- ระบบทำงานวงล้อสุ่ม ---
    function generateTrackItems(totalItems, pool) {
        track.innerHTML = '';
        for (let i = 0; i < totalItems; i++) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item';
            const randomVal = pool[Math.floor(Math.random() * pool.length)];
            itemDiv.innerText = `[ ${randomVal} ]`;
            itemDiv.classList.add(randomVal.includes('+') ? 'plus' : 'minus');
            track.appendChild(itemDiv);
        }
    }

    function startSpin(modeName, targetPool) {
        if (isSpinning) return;
        isSpinning = true;

        modeIndicator.innerHTML = `กำลังสุ่มโหมด: <span>${modeName}</span>`;
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        track.offsetHeight;

        const totalItems = 60;
        generateTrackItems(totalItems, targetPool);

        const winningIndex = 50; 
        const itemWidth = 140; 
        const windowCenter = windowDiv.offsetWidth / 2;
        const centerOfWinningItem = (winningIndex * itemWidth) + (itemWidth / 2);
        const finalTranslateX = windowCenter - centerOfWinningItem;
        const randomOffset = Math.floor(Math.random() * 30) - 15; 

        track.style.transition = 'transform 4s cubic-bezier(0.15, 0.85, 0.15, 1)';
        track.style.transform = `translateX(${finalTranslateX + randomOffset}px)`;

        let tickInterval = setInterval(playTick, 140);
        setTimeout(() => { clearInterval(tickInterval); tickInterval = setInterval(playTick, 280); }, 2000);
        setTimeout(() => { clearInterval(tickInterval); tickInterval = setInterval(playTick, 480); }, 3000);

        setTimeout(() => {
            clearInterval(tickInterval);
            playWin();
            isSpinning = false;

            const winningItem = track.children[winningIndex];
            winningItem.style.transform = "scale(1.12)";
            winningItem.style.backgroundColor = "#222";
            
            const rawText = winningItem.innerText.replace('[', '').replace(']', '').trim();
            modeIndicator.innerHTML = `สุ่มเสร็จสิ้น! ผลลัพธ์: <span>${rawText}</span>`;
            
            parseAndTriggerBoost(rawText);
        }, 4000);
    }

    function parseAndTriggerBoost(resultText) {
        const parts = resultText.split(/\s+/);
        const sign = parts[0];
        const amount = parseInt(parts[1]);
        const unit = parts[2];

        let totalSeconds = amount;
        if (unit === 'M') { totalSeconds = amount * 60; }
        if (sign === '-') { totalSeconds = -totalSeconds; }

        let durationMs = 1000;
        let effectClass = 'effect-5-10';

        if (unit === 'M') {
            if (amount <= 10) { durationMs = 1000; effectClass = 'effect-5-10'; }
            else if (amount <= 30) { durationMs = 2000; effectClass = 'effect-30'; }
            else { durationMs = 4000; effectClass = 'effect-60'; }
        }

        window.smartBoost(totalSeconds, durationMs, effectClass);
    }

    // --- ระบบดักจับปุ่ม Macro Key ---
    window.addEventListener('keydown', (e) => {
        if (e.altKey && e.key === '1') {
            e.preventDefault(); startSpin('หลักวินาที (G1)', secondsPool);
        } else if (e.altKey && e.key === '2') {
            e.preventDefault(); startSpin('หลักนาทีใหญ่ (G2)', minutesLargePool);
        } else if (e.altKey && e.key === '3') {
            e.preventDefault(); startSpin('โหมด 10 Pok (G3)', minutesSmallPool);
        }
    });

    // --- ระบบจัดการเวลาหลัก ---
    function syncToFirebase() {
        timerRef.update({
            remainingTime: window.countdownTime,
            isRunning: window.interval !== null,
            lastActionTime: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function fadeChangeImage(newSrc) {
        if (catImage.src.includes(newSrc) || isChangingImage) return;
        isChangingImage = true;
        catImage.style.opacity = 0;
        setTimeout(() => {
            catImage.src = newSrc;
            catImage.style.opacity = 1;
            isChangingImage = false;
        }, 500);
    }

    function updateTimerDisplay() {
        let hours = Math.floor(window.countdownTime / 3600);
        let minutes = Math.floor((window.countdownTime % 3600) / 60);
        let seconds = Math.floor(window.countdownTime % 60);
        if (seconds < 0) seconds = 0;

        timerElement.innerHTML = `${String(hours).padStart(2, '0')} : ${String(minutes).padStart(2, '0')} : ${String(seconds).padStart(2, '0')}`;
        
        if (window.countdownTime <= 1800) { 
            timerElement.classList.add('red'); fadeChangeImage("cat3-1.png");
        } else if (window.countdownTime <= 7200) {
            timerElement.classList.remove('red'); fadeChangeImage("cat3-2.png");
        } else {
            timerElement.classList.remove('red'); fadeChangeImage("cat3-3.png");
        }
    }

    window.runBoostAnimation = function(totalSeconds, durationMs, effectClass, isThisMachineMaster) {
        activeBoosts++;
        timerElement.classList.add(totalSeconds > 0 ? 'boost-up' : 'boost-down');
        catLayer.classList.add(effectClass);

        if (isThisMachineMaster) {
            const fps = 30; 
            const totalSteps = (durationMs / 1000) * fps;
            const incrementPerStep = totalSeconds / totalSteps;
            let stepsTaken = 0;
            let accumulatedChange = 0;
            let lastIntegerChange = 0;

            let boostTask = setInterval(() => {
                stepsTaken++;
                accumulatedChange += incrementPerStep;
                let currentIntegerChange = Math.round(accumulatedChange);
                let diff = currentIntegerChange - lastIntegerChange;
                lastIntegerChange = currentIntegerChange;

                window.countdownTime = Math.max(0, window.countdownTime + diff);
                updateTimerDisplay();

                if (stepsTaken >= totalSteps) {
                    clearInterval(boostTask);
                    syncToFirebase();
                    finishBoost(effectClass);
                }
            }, 1000 / fps);
        } else {
            setTimeout(() => { finishBoost(effectClass); }, durationMs);
        }
    }

    function finishBoost(effectClass) {
        activeBoosts--;
        if (activeBoosts <= 0) {
            activeBoosts = 0;
            timerElement.classList.remove('boost-up', 'boost-down');
            catLayer.classList.remove('effect-5-10', 'effect-30', 'effect-60');
            isMaster = false;
        }
    }

    window.smartBoost = function(totalSeconds, durationMs, effectClass) {
        const eventId = "ev_" + Date.now();
        lastEventId = eventId;
        isMaster = true; 
        window.runBoostAnimation(totalSeconds, durationMs, effectClass, true);

        timerRef.update({
            boostEvent: { totalSeconds, durationMs, effectClass, id: eventId }
        });
    }

    function countdown() {
        if (window.countdownTime > 0) {
            window.countdownTime--;
            updateTimerDisplay();
        } else {
            window.stopTimer();
        }
    }

    window.startTimer = function(isLocal = true) {
        if (window.interval) clearInterval(window.interval); 
        window.interval = setInterval(countdown, 1000);
        document.getElementById('startBtn').classList.add('active');
        document.getElementById('stopBtn').classList.remove('active');
        if (isLocal) syncToFirebase();
    }

    window.stopTimer = function(isLocal = true) {
        if (window.interval) {
            clearInterval(window.interval);
            window.interval = null;
        }
        document.getElementById('startBtn').classList.remove('active');
        document.getElementById('stopBtn').classList.add('active');
        if (isLocal) syncToFirebase();
    }

    window.resetTimer = function() {
        window.stopTimer();
        window.countdownTime = 3 * 60 * 60;
        lastEventId = "RESET_" + Date.now();
        updateTimerDisplay();
        timerRef.set({
            remainingTime: window.countdownTime,
            isRunning: false,
            boostEvent: null,
            lastActionTime: firebase.database.ServerValue.TIMESTAMP
        });
    };

    timerRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data || isMaster) return;

        if (data.isRunning && !window.interval) {
            window.countdownTime = data.remainingTime;
            window.startTimer(false);
        } else if (!data.isRunning && window.interval) {
            window.stopTimer(false);
            window.countdownTime = data.remainingTime;
            updateTimerDisplay();
        } else if (!window.interval) {
            window.countdownTime = data.remainingTime;
            updateTimerDisplay();
        }

        if (data.boostEvent && data.boostEvent.id !== lastEventId) {
            if (lastEventId === "INIT") {
                lastEventId = data.boostEvent.id;
            } else {
                lastEventId = data.boostEvent.id;
                window.runBoostAnimation(data.boostEvent.totalSeconds, data.boostEvent.durationMs, data.boostEvent.effectClass, false);
            }
        }
    });

    generateTrackItems(10, secondsPool);
    track.style.transform = `translateX(${ (windowDiv.offsetWidth / 2) - 70 }px)`;
    updateTimerDisplay();
</script>
</body>
</html>
