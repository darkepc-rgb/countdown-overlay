<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer - Firebase Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: transparent; 
            color: white;
            font-family: 'Itim', cursive;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .timer-stack-wrapper {
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 576px;  
            height: 324px; 
        }

        #timer {
            position: relative;
            z-index: 1; 
            font-size: 3.5rem; 
            font-weight: bold;
            transition: color 0.3s ease;
            margin-top: 22px;   
            margin-left: 125px; 
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0px  4px 12px rgba(0,0,0,0.9);
        }

        .cat-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            pointer-events: none; 
        }

        .cat-overlay-layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.5s ease-in-out, transform 0.3s ease-out;
            opacity: 1;
        }

        /* --- Animations --- */
        @keyframes pulse-soft {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.1); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes pulse-medium {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes pulse-strong {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.08); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .effect-5-10 { animation: pulse-soft 0.8s infinite ease-in-out; }
        .effect-30 { animation: pulse-medium 0.5s infinite ease-in-out; }
        .effect-60 { animation: pulse-strong 0.4s infinite ease-in-out; }

        .red { color: #ff3e3e !important; }
        .boost-up { color: #2ecc71 !important; }
        .boost-down { color: #ff4757 !important; }

        .buttons { margin-top: 20px; z-index: 10; position: relative; }
        .buttons button {
            margin: 5px; padding: 10px 18px; font-size: 1rem; font-weight: bold;
            cursor: pointer; border: 2px solid #333; background: #ffffff;
            color: #000; border-radius: 8px; font-family: 'Itim', cursive;
            box-shadow: 0 4px 0 #999, 0 6px 10px rgba(0,0,0,0.3); transition: all 0.1s ease;
        }
        .buttons button:active { transform: translateY(3px); box-shadow: 0 1px 0 #777; }
        
        #startBtn.active { background: #27ae60; color: white; border-color: #1e8449; box-shadow: 0 4px 0 #1e8449; }
        #stopBtn.active { background: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; }
        #resetBtn { background: #f39c12; color: white; border-color: #d35400; box-shadow: 0 4px 0 #d35400; }
    </style>
</head>
<body>

    <div class="timer-stack-wrapper">
        <div id="timer">03 : 00 : 00</div>
        <div class="cat-overlay-layer" id="catLayer">
            <img src="cat3-3.png" id="catImage">
        </div>
    </div>
    
    <div class="buttons">
        <button onclick="smartBoost(5 * 60, 1000, 'effect-5-10')">+5 นาที</button>
        <button onclick="smartBoost(10 * 60, 1000, 'effect-5-10')">+10 นาที</button>
        <button onclick="smartBoost(30 * 60, 2000, 'effect-30')">+30 นาที</button>
        <button onclick="smartBoost(60 * 60, 4000, 'effect-60')">+1 ชม.</button>
    </div>
    <div class="buttons">
        <button onclick="smartBoost(-5 * 60, 1000, 'effect-5-10')">-5 นาที</button>
        <button onclick="smartBoost(-10 * 60, 1000, 'effect-5-10')">-10 นาที</button>
        <button onclick="smartBoost(-30 * 60, 2000, 'effect-30')">-30 นาที</button>
        <button onclick="smartBoost(-60 * 60, 4000, 'effect-60')">-1 ชม.</button>
    </div>
    <div class="buttons">
        <button id="stopBtn" onclick="stopTimer()">หยุด</button>
        <button id="resetBtn" onclick="resetTimer()">รีเซต</button>
        <button id="startBtn" onclick="startTimer()">เริ่ม</button>
    </div>
    
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTqaj2D4b5p_loXgh7jjIW9D5zfi_2dUk",
        authDomain: "countdown-timer-8dd4c.firebaseapp.com",
        databaseURL: "https://countdown-timer-8dd4c-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "countdown-timer-8dd4c",
        storageBucket: "countdown-timer-8dd4c.firebasestorage.app",
        messagingSenderId: "1086221236719",
        appId: "1:1086221236719:web:5e3148af69cb7303c1de1a",
        measurementId: "G-P2TLY8RGZV"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const timerRef = db.ref('timer_data');

    // --- State Variables ---
    window.countdownTime = localStorage.getItem('countdownTime') ? parseInt(localStorage.getItem('countdownTime')) : 3 * 60 * 60;
    const timerElement = document.getElementById('timer');
    const catImage = document.getElementById('catImage');
    const catLayer = document.getElementById('catLayer');
    window.interval = null;
    let activeBoosts = 0;
    let lastBoostTimestamp = 0;
    let isChangingImage = false;

    // --- Functions ---
    function syncToFirebase() {
        timerRef.update({
            remainingTime: window.countdownTime,
            isRunning: window.interval !== null,
            lastUpdate: Date.now()
        });
    }

    function fadeChangeImage(newSrc) {
        if (catImage.src.includes(newSrc) || isChangingImage) return;
        isChangingImage = true;
        catImage.style.opacity = 0;
        setTimeout(() => {
            catImage.src = newSrc;
            catImage.style.opacity = 1;
            isChangingImage = false;
        }, 500);
    }

    function updateTimerDisplay() {
        let hours = Math.floor(window.countdownTime / 3600);
        let minutes = Math.floor((window.countdownTime % 3600) / 60);
        let seconds = Math.round(window.countdownTime % 60);
        timerElement.innerHTML = `${String(hours).padStart(2, '0')} : ${String(minutes).padStart(2, '0')} : ${String(seconds).padStart(2, '0')}`;
        
        if (window.countdownTime <= 1800) { 
            timerElement.classList.add('red'); fadeChangeImage("cat3-1.png");
        } else if (window.countdownTime <= 7200) {
            timerElement.classList.remove('red'); fadeChangeImage("cat3-2.png");
        } else {
            timerElement.classList.remove('red'); fadeChangeImage("cat3-3.png");
        }
    }

    // ฟังก์ชันรันแอนิเมชัน (ตัวเลขจะถูกคำนวณที่นี่)
    window.runBoostAnimation = function(totalSeconds, durationMs, effectClass) {
        activeBoosts++;
        const fps = 30; 
        const totalSteps = (durationMs / 1000) * fps;
        const incrementPerStep = totalSeconds / totalSteps;
        let stepsTaken = 0;
        let accumulatedChange = 0;
        let lastIntegerChange = 0;

        timerElement.classList.add(totalSeconds > 0 ? 'boost-up' : 'boost-down');
        catLayer.classList.add(effectClass);

        let boostTask = setInterval(() => {
            stepsTaken++;
            accumulatedChange += incrementPerStep;
            let currentIntegerChange = Math.round(accumulatedChange);
            let diff = currentIntegerChange - lastIntegerChange;
            lastIntegerChange = currentIntegerChange;

            window.countdownTime = Math.max(0, window.countdownTime + diff);
            updateTimerDisplay();

            if (stepsTaken >= totalSteps) {
                clearInterval(boostTask);
                activeBoosts--;
                if (activeBoosts <= 0) {
                    activeBoosts = 0;
                    timerElement.classList.remove('boost-up', 'boost-down');
                    catLayer.classList.remove('effect-5-10', 'effect-30', 'effect-60');
                    localStorage.setItem('countdownTime', Math.round(window.countdownTime));
                    syncToFirebase(); // ซิงค์ค่าสุดท้ายเมื่อจบแอนิเมชัน
                }
            }
        }, 1000 / fps);
    }

    // เมื่อกดปุ่มจากเครื่องต้นทาง
    window.smartBoost = function(totalSeconds, durationMs, effectClass) {
        const timestamp = Date.now();
        lastBoostTimestamp = timestamp; // บันทึกไว้ว่าเครื่องนี้เป็นคนรัน จะได้ไม่รันซ้ำจาก Firebase

        // 1. รันที่ตัวเอง
        window.runBoostAnimation(totalSeconds, durationMs, effectClass);

        // 2. ส่งสัญญาณ (รวม timestamp)
        timerRef.update({
            boostEvent: { totalSeconds, durationMs, effectClass, timestamp },
            isRunning: window.interval !== null
        });
    }

    function countdown() {
        if (window.countdownTime > 0) {
            window.countdownTime--;
            updateTimerDisplay();
            if (window.countdownTime % 10 === 0) syncToFirebase(); // ซิงค์ทุก 10 วิเพื่อประหยัด Data
        } else {
            window.stopTimer();
        }
    }

    window.startTimer = function(isLocal = true) {
        if (!window.interval) {
            window.interval = setInterval(countdown, 1000);
            document.getElementById('startBtn').classList.add('active');
            document.getElementById('stopBtn').classList.remove('active');
            if (isLocal) syncToFirebase();
        }
    }

    window.stopTimer = function(isLocal = true) {
        clearInterval(window.interval);
        window.interval = null;
        document.getElementById('startBtn').classList.remove('active');
        document.getElementById('stopBtn').classList.add('active');
        if (isLocal) syncToFirebase();
    }

    window.resetTimer = function() {
        window.stopTimer();
        window.countdownTime = 3 * 60 * 60;
        updateTimerDisplay();
        syncToFirebase();
    };

    // --- Firebase Sync Logic ---
    timerRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // 1. ซิงค์เวลา (เฉพาะตอนที่เครื่องอยู่นิ่งๆ ไม่ได้กำลังรัน Boost)
        if (activeBoosts === 0) {
            if (Math.abs(window.countdownTime - data.remainingTime) > 2) {
                window.countdownTime = data.remainingTime;
                updateTimerDisplay();
            }
        }

        // 2. เช็ค Boost Event จากเครื่องอื่น
        if (data.boostEvent && data.boostEvent.timestamp > lastBoostTimestamp) {
            lastBoostTimestamp = data.boostEvent.timestamp;
            // รันแอนิเมชันตาม (เลขจะถูกบวกในฟังก์ชัน runBoostAnimation ของเครื่องนี้ด้วย)
            window.runBoostAnimation(
                data.boostEvent.totalSeconds, 
                data.boostEvent.durationMs, 
                data.boostEvent.effectClass
            );
        }

        // 3. ซิงค์สถานะ Start/Stop
        if (data.isRunning && !window.interval) window.startTimer(false);
        else if (!data.isRunning && window.interval) window.stopTimer(false);
    });

    updateTimerDisplay();
</script>
</body>
</html>
